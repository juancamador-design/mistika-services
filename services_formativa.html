<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:#09090e !important;min-height:100%}

}
#sv-root *{font-family:'DM Sans',Georgia,sans-serif;}
#sv-root .sv-h1,#sv-root .sv-card-name,#sv-root .sv-exp-title,#sv-root .sv-prod-name{

/* ===== LANG BAR ===== */
.sv-lang-bar{display:flex;justify-content:flex-end;padding:16px 32px 0;gap:4px;}
.sv-lang-btn{
  font-size:11px;letter-spacing:.1em;font-weight:500;
  padding:5px 14px;border-radius:4px;border:.5px solid rgba(255,255,255,0.1);
  cursor:pointer;background:transparent;color:rgba(240,236,228,0.55);transition:all .18s;
}
.sv-lang-btn.on{background:rgba(200,169,110,0.15);border-color:#c8a96e;color:#c8a96e;}
.sv-lang-btn:hover:not(.on){color:#f0ece4;border-color:rgba(255,255,255,0.2);}

/* ===== HERO ===== */
.sv-hero{position:relative;padding:60px 32px 48px;text-align:center;overflow:hidden;}
.sv-hero::before{
  content:'';position:absolute;top:-80px;left:50%;transform:translateX(-50%);
  width:700px;height:500px;
  background:radial-gradient(ellipse,rgba(200,169,110,0.05) 0%,transparent 70%);
  pointer-events:none;
}
.sv-eyebrow{
  font-size:10px;letter-spacing:.28em;text-transform:uppercase;
  color:#c8a96e;margin-bottom:18px;
  display:flex;align-items:center;justify-content:center;gap:12px;font-weight:500;
}
.sv-eyebrow::before,.sv-eyebrow::after{content:'';width:36px;height:.5px;background:#c8a96e;opacity:.4;}
.sv-h1{
  font-size:clamp(38px,5.5vw,66px);font-weight:300;line-height:1.06;
  color:#f0ece4;margin-bottom:14px;
}
.sv-h1 em{font-style:italic;color:#c8a96e;}
.sv-hero-sub{
  font-size:14px;color:rgba(240,236,228,0.55);
  max-width:460px;margin:0 auto;line-height:1.8;font-weight:300;
}

/* ===== SECTION LABELS ===== */
.sv-section{padding:0 32px 12px;max-width:1080px;margin:40px auto 0;}
.sv-section-label{
  display:flex;align-items:center;gap:14px;
  font-size:9px;letter-spacing:.25em;text-transform:uppercase;
  color:rgba(240,236,228,0.4);font-weight:500;margin-bottom:20px;
}
.sv-section-label::after{content:'';flex:1;height:.5px;background:rgba(255,255,255,0.07);}

/* ===== SERVICE GRID ===== */
.sv-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:10px;max-width:1080px;margin:0 auto;padding:0 32px;
}

/* ===== SERVICE CARD ===== */
.sv-card{
  background:#13131c;border:.5px solid rgba(255,255,255,0.07);
  border-radius:14px;overflow:hidden;cursor:pointer;
  transition:border-color .3s, transform .3s;
  position:relative;
}
.sv-card:hover{border-color:rgba(200,169,110,0.2);transform:translateY(-2px);}
.sv-card.open{border-color:rgba(200,169,110,0.45);transform:translateY(-2px);}
.sv-card.open::before{
  content:'';position:absolute;inset:0;border-radius:14px;
  background:radial-gradient(ellipse at 50% 0%,rgba(200,169,110,0.04) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}

/* Card collapsed */
.sv-card-front{padding:20px 18px 18px;position:relative;z-index:1;}
.sv-card-icon-wrap{
  width:40px;height:40px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;margin-bottom:14px;
  background:rgba(255,255,255,0.04);
  border:.5px solid rgba(255,255,255,0.06);
}
.sv-card-name{
  font-size:18px;font-weight:400;color:#f0ece4;
  margin-bottom:6px;line-height:1.15;
}
.sv-card-teaser{
  font-size:11px;color:rgba(240,236,228,0.45);
  line-height:1.6;margin-bottom:16px;
}
.sv-card-toggle{
  display:flex;align-items:center;gap:7px;
  font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:500;
  color:rgba(200,169,110,0.65);background:none;border:none;cursor:pointer;
  padding:0;transition:color .2s;
}
.sv-card-toggle:hover{color:#c8a96e;}
.sv-toggle-circle{
  width:18px;height:18px;border-radius:50%;
  border:.5px solid rgba(200,169,110,0.35);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:300;color:rgba(200,169,110,0.65);
  transition:all .3s;flex-shrink:0;
}
.sv-card.open .sv-toggle-circle{
  background:#c8a96e;border-color:#c8a96e;
  color:#09090e;transform:rotate(45deg);
}

/* Card expanded */
.sv-card-back{
  max-height:0;overflow:hidden;opacity:0;
  transition:max-height .5s cubic-bezier(.16,1,.3,1), opacity .4s ease;
  position:relative;z-index:1;
}
.sv-card.open .sv-card-back{max-height:500px;opacity:1;}
.sv-card-back-inner{
  padding:0 18px 20px;
  border-top:.5px solid rgba(255,255,255,0.06);
  padding-top:16px;
}
.sv-exp-eyebrow{
  font-size:9px;letter-spacing:.2em;text-transform:uppercase;
  color:#c8a96e;margin-bottom:8px;font-weight:500;
}
.sv-exp-title{
  font-size:15px;font-weight:400;color:#f0ece4;
  margin-bottom:10px;line-height:1.3;
}
.sv-exp-text{
  font-size:12px;color:rgba(240,236,228,0.6);
  line-height:1.75;margin-bottom:14px;
}
.sv-exp-features{margin-bottom:16px;}
.sv-exp-feat{
  display:flex;gap:8px;align-items:flex-start;
  padding:4px 0;font-size:11px;color:rgba(240,236,228,0.55);
  line-height:1.5;
  border-bottom:.5px solid rgba(255,255,255,0.04);
}
.sv-exp-feat:last-child{border-bottom:none;}
.sv-exp-dot{
  width:4px;height:4px;border-radius:50%;background:#c8a96e;
  flex-shrink:0;margin-top:5px;
}
.sv-exp-cta{
  display:flex;align-items:center;justify-content:center;gap:6px;width:100%;
  font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:500;
  color:#c8a96e;text-decoration:none;
  border:.5px solid rgba(200,169,110,.3);padding:9px 14px;border-radius:4px;
  background:rgba(200,169,110,.07);transition:all .22s;
}
.sv-exp-cta:hover{background:rgba(200,169,110,.18);border-color:#c8a96e;color:#f0ece4;}
.sv-exp-cta-arr{transition:transform .18s;display:inline-block;}
.sv-exp-cta:hover .sv-exp-cta-arr{transform:translateX(3px);}

/* ===== PRODUCTS SECTION ===== */
.sv-prod-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));

.sv-prod-card{

  display:flex;align-items:center;justify-content:center;font-size:20px;
  background:rgba(255,255,255,0.04);border:.5px solid rgba(255,255,255,0.06);
  flex-shrink:0;
}
.sv-prod-name{font-size:20px;font-weight:400;color:#f0ece4;line-height:1.1;}
.sv-prod-desc{font-size:12px;color:rgba(240,236,228,0.5);line-height:1.65;flex:1;}
.sv-prod-link{
  display:inline-flex;align-items:center;gap:6px;align-self:flex-start;
  font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:500;
  color:#c8a96e;text-decoration:none;
  border:.5px solid rgba(200,169,110,.3);padding:8px 14px;border-radius:4px;

.sv-prod-link:hover{background:rgba(200,169,110,.18);border-color:#c8a96e;color:#f0ece4;}

/* ===== DIVIDER ===== */
.sv-divider{

.sv-divider hr{border:none;border-top:.5px solid rgba(255,255,255,0.07);}

/* ===== RESPONSIVE ===== */
@media(max-width:640px){
  .sv-hero{padding:52px 18px 36px;}
  .sv-section{padding:0 16px 10px;}

  .sv-prod-grid{padding:0 16px 48px;grid-template-columns:1fr;}
  .sv-divider{padding:0 16px;}
  .sv-lang-bar{padding:12px 18px 0;}

</style>

var lang = localStorage.getItem('sv_lang') || 'es';
var CTA_SPEC = {es:'Ver especialistas →',en:'See specialists →'};
var KNOW_MORE = {es:'Conoce más',en:'Learn more'};

function renderServices(){
  var grid = document.getElementById('svGrid');
  grid.innerHTML = SERVICES.map(function(s,i){
    var feats = (lang==='en'?s.features_en:s.features_es)
      .split('|').map(function(f){
        return '<div class="sv-exp-feat"><div class="sv-exp-dot"></div><span>'+f.trim()+'</span></div>';
      }).join('');
    return '<div class="sv-card" onclick="svToggle(this)" style="animation:svFadeUp .4s both;animation-delay:'+(i*0.05)+'s">'
      +'<div class="sv-card-front">'
      +'<div class="sv-card-icon-wrap" style="background:'+s.color+'">'+s.icon+'</div>'
      +'<div class="sv-card-name">'+(lang==='en'?s.name_en:s.name_es)+'</div>'
      +'<div class="sv-card-teaser">'+(lang==='en'?s.teaser_en:s.teaser_es)+'</div>'
      +'<button class="sv-card-toggle">'
      +(KNOW_MORE[lang])+' <div class="sv-toggle-circle">+</div>'
      +'</button>'
      +'</div>'
      +'<div class="sv-card-back"><div class="sv-card-back-inner">'
      +'<div class="sv-exp-eyebrow">'+(lang==='en'?s.name_en:s.name_es)+'</div>'
      +'<div class="sv-exp-title">'+(lang==='en'?s.exp_title_en:s.exp_title_es)+'</div>'
      +'<div class="sv-exp-text">'+(lang==='en'?s.exp_text_en:s.exp_text_es)+'</div>'
      +'<div class="sv-exp-features">'+feats+'</div>'
      +'<a class="sv-exp-cta" href="'+s.specialists_url+'" target="_blank">'
      +CTA_SPEC[lang]+' <span class="sv-exp-cta-arr"></span></a>'
      +'</div></div>'
      +'</div>';
  }).join('');
}

function renderProducts(){
  var grid = document.getElementById('svProdGrid');
  grid.innerHTML = PRODUCTS.map(function(p,i){
    return '<div class="sv-prod-card" style="animation:svFadeUp .4s both;animation-delay:'+(0.5+i*0.08)+'s">'
      +'<div class="sv-prod-top">'
      +'<div class="sv-prod-icon" style="background:'+p.color+'">'+p.icon+'</div>'
      +'<div class="sv-prod-name">'+(lang==='en'?p.name_en:p.name_es)+'</div>'
      +'</div>'
      +'<div class="sv-prod-desc">'+(lang==='en'?p.desc_en:p.desc_es)+'</div>'
      +'<a class="sv-prod-link" href="'+p.url+'" target="_blank">'
      +(lang==='en'?p.link_en:p.link_es)+' →</a>'
      +'</div>';
  }).join('');
}

function svToggle(card){
  var wasOpen = card.classList.contains('open');
  document.querySelectorAll('.sv-card').forEach(function(c){c.classList.remove('open');});
  if(!wasOpen){
    card.classList.add('open');
    setTimeout(svSendHeight, 520);
  }
  svSendHeight();
}

function svLang(l){
  lang = l;
  localStorage.setItem('sv_lang', l);
  document.querySelectorAll('.sv-lang-btn').forEach(function(b){
    b.classList.toggle('on', b.dataset.lang===l);
  });
  // Apply static text
  document.querySelectorAll('#sv-root [data-es]').forEach(function(el){
    var txt = el.getAttribute('data-'+l);
    if(!txt) return;
    if(txt.indexOf('<')>-1) el.innerHTML=txt; else el.textContent=txt;
  });
  renderServices();
  renderProducts();
  svSendHeight();
}

// Auto-height for iframe
function svSendHeight(){
  var h = document.getElementById('sv-root').scrollHeight;
  window.parent.postMessage({mkHeight: h}, '*');
}
window.addEventListener('load', svSendHeight);
window.addEventListener('resize', svSendHeight);
setInterval(svSendHeight, 800);

// Fade-up animation
var style = document.createElement('style');
style.textContent = '@keyframes svFadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}';
document.head.appendChild(style);

// Init
renderServices();
renderProducts();
</script>
