<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#f8f5f0;min-height:100%;width:100%;}

#sv-root{
  --ash:#f8f5f0;--fog:#e8e3db;--mist:#d4ccc0;--stone:#8a8278;
  --gold:#c9a84c;--gold-s:rgba(201,168,76,0.12);--gold-b:rgba(201,168,76,0.35);

  --white:#ffffff;
  background:#f8f5f0;color:#0d0b1a;

  min-height:100vh;width:100%;display:block;
}
#sv-root *{font-family:'DM Sans',sans-serif;}
#sv-root .sv-h1,#sv-root .sv-card-name,#sv-root .sv-exp-title,#sv-root .sv-prod-name,#sv-root .sv-cat-title{
  font-family:'Cormorant Garamond',serif !important;
}

/* LANG BAR */
.sv-lang-bar{background:var(--violet);display:flex;justify-content:flex-end;align-items:center;padding:9px 32px;gap:4px;}
.sv-lang-btn{font-size:11px;letter-spacing:.1em;font-weight:500;padding:5px 14px;border-radius:100px;border:.5px solid rgba(255,255,255,0.2);cursor:pointer;background:transparent;color:rgba(255,255,255,0.55);transition:all .18s;}
.sv-lang-btn.on{background:var(--gold);border-color:var(--gold);color:var(--deep);}
.sv-lang-btn:hover:not(.on){color:white;border-color:rgba(255,255,255,0.4);}

/* HERO */
.sv-hero{background:linear-gradient(135deg,#f5f0ea 0%,#ede8f5 55%,#f0ece8 100%);padding:56px 32px 44px;text-align:center;position:relative;overflow:hidden;}
.sv-hero::before{content:'';position:absolute;top:-60px;right:-60px;width:340px;height:340px;border-radius:50%;background:rgba(124,111,160,0.07);pointer-events:none;}
.sv-eyebrow{font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--vm);margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:10px;font-weight:500;}
.sv-eyebrow::before,.sv-eyebrow::after{content:'';width:32px;height:.5px;background:var(--gold);opacity:.5;}
.sv-h1{font-size:clamp(36px,5vw,60px);font-weight:300;line-height:1.06;color:var(--deep);margin-bottom:12px;}
.sv-h1 em{font-style:italic;color:var(--violet);}
.sv-hero-sub{font-size:14px;color:var(--stone);max-width:440px;margin:0 auto;line-height:1.8;font-weight:300;}

/* SECTION LABELS */
.sv-section{padding:0 32px 10px;max-width:1080px;margin:36px auto 0;}
.sv-section-label{display:flex;align-items:center;gap:12px;font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:var(--stone);font-weight:500;margin-bottom:18px;}
.sv-section-label::after{content:'';flex:1;height:.5px;background:var(--fog);}

/* CATEGORY GROUPS */
.sv-cat-group{max-width:1080px;margin:0 auto;padding:0 32px;margin-bottom:32px;}
.sv-cat-header{display:flex;align-items:center;gap:12px;padding:12px 0 16px;border-bottom:1px solid var(--fog);margin-bottom:14px;}
.sv-cat-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.sv-cat-title{font-size:clamp(18px,2.5vw,24px);font-weight:300;color:var(--deep);}
.sv-cat-title em{font-style:italic;color:var(--vm);}

/* SERVICE GRID */
.sv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;}

/* SERVICE CARD */
.sv-card{background:var(--white);border:1px solid var(--fog);border-radius:16px;overflow:hidden;cursor:pointer;transition:border-color .3s,transform .25s,box-shadow .25s;position:relative;}
.sv-card:hover{border-color:var(--vm);transform:translateY(-2px);box-shadow:0 8px 28px rgba(58,45,140,0.1);}
.sv-card.open{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 8px 28px rgba(201,168,76,0.15);}
.sv-card.open::before{content:'';position:absolute;inset:0;border-radius:16px;background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,0.04) 0%,transparent 70%);pointer-events:none;z-index:0;}

/* Card front */
.sv-card-front{padding:20px 18px 16px;position:relative;z-index:1;}
.sv-card-icon-wrap{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:12px;border:.5px solid var(--fog);}
.sv-card-name{font-size:17px;font-weight:400;color:var(--deep);margin-bottom:5px;line-height:1.2;}
.sv-card-teaser{font-size:11px;color:var(--stone);line-height:1.6;margin-bottom:14px;}
.sv-card-toggle{display:flex;align-items:center;gap:7px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:500;color:var(--vm);background:none;border:none;cursor:pointer;padding:0;transition:color .2s;}
.sv-card-toggle:hover{color:var(--violet);}
.sv-toggle-circle{width:18px;height:18px;border-radius:50%;border:.5px solid rgba(124,111,160,0.4);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:300;color:var(--vm);transition:all .3s;flex-shrink:0;}
.sv-card.open .sv-toggle-circle{background:var(--gold);border-color:var(--gold);color:var(--deep);transform:rotate(45deg);}

/* Card expanded */
.sv-card-back{max-height:0;overflow:hidden;opacity:0;transition:max-height .5s cubic-bezier(.16,1,.3,1),opacity .4s ease;position:relative;z-index:1;}
.sv-card.open .sv-card-back{max-height:600px;opacity:1;}
.sv-card-back-inner{padding:16px 18px 20px;border-top:1px solid var(--fog);}
.sv-exp-eyebrow{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:6px;font-weight:500;}
.sv-exp-title{font-size:15px;font-weight:400;color:var(--deep);margin-bottom:8px;line-height:1.3;}
.sv-exp-text{font-size:12px;color:var(--stone);line-height:1.75;margin-bottom:12px;}
.sv-exp-features{margin-bottom:14px;}
.sv-exp-feat{display:flex;gap:8px;align-items:flex-start;padding:5px 0;font-size:11px;color:var(--stone);line-height:1.5;border-bottom:.5px solid var(--fog);}
.sv-exp-feat:last-child{border-bottom:none;}
.sv-exp-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);flex-shrink:0;margin-top:4px;}
.sv-exp-cta{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:500;color:var(--violet);text-decoration:none;border:.5px solid rgba(58,45,140,0.25);padding:9px 14px;border-radius:100px;background:var(--vp);transition:all .22s;}
.sv-exp-cta:hover{background:var(--violet);color:white;border-color:var(--violet);}
.sv-exp-cta-arr{transition:transform .18s;display:inline-block;}
.sv-exp-cta:hover .sv-exp-cta-arr{transform:translateX(3px);}

/* PRODUCTS */
.sv-prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;max-width:1080px;margin:0 auto;padding:0 32px 48px;}
.sv-prod-card{background:var(--white);border:1px solid var(--fog);border-radius:16px;padding:22px 20px;display:flex;flex-direction:column;gap:10px;transition:border-color .25s,transform .25s;}
.sv-prod-card:hover{border-color:var(--vm);transform:translateY(-2px);box-shadow:0 8px 24px rgba(58,45,140,0.08);}
.sv-prod-top{display:flex;align-items:center;gap:12px;}
.sv-prod-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;border:.5px solid var(--fog);flex-shrink:0;}
.sv-prod-name{font-size:20px;font-weight:400;color:var(--deep);line-height:1.1;}
.sv-prod-desc{font-size:12px;color:var(--stone);line-height:1.65;flex:1;}
.sv-prod-link{display:inline-flex;align-items:center;gap:6px;align-self:flex-start;font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:500;color:var(--violet);text-decoration:none;border:.5px solid rgba(58,45,140,0.25);padding:8px 16px;border-radius:100px;background:var(--vp);transition:all .22s;margin-top:4px;}
.sv-prod-link:hover{background:var(--violet);color:white;border-color:var(--violet);}

/* DIVIDER */
.sv-divider{max-width:1080px;margin:24px auto;padding:0 32px;}
.sv-divider hr{border:none;border-top:1px solid var(--fog);}

/* RESPONSIVE */
@media(max-width:640px){
  .sv-hero{padding:48px 18px 36px;}
  .sv-section,.sv-cat-group{padding:0 16px;}
  .sv-prod-grid{padding:0 16px 40px;}
  .sv-lang-bar{padding:9px 18px;}
  .sv-grid{grid-template-columns:1fr;}
}
</style>
</head>

        +'<div class="sv-exp-text">'+(lang==='en'?s.text_en:s.text_es)+'</div>'
        +'<div class="sv-exp-features">'+feats+'</div>'
        +'<a class="sv-exp-cta" href="'+SPEC_URL+'" target="_blank">'+CTA_SPEC[lang]+' <span class="sv-exp-cta-arr">→</span></a>'
        +'</div></div>'
        +'</div>';
    }).join('');
    return '<div class="sv-cat-group">'
      +'<div class="sv-cat-header">'
      +'<div class="sv-cat-icon" style="background:'+cat.bg+'">'+cat.icon+'</div>'
      +'<div class="sv-cat-title">'+(lang==='en'?cat.name_en:cat.name_es)+'</div>'
      +'</div>'
      +'<div class="sv-grid">'+services+'</div>'
      +'</div>';
  }).join('<div class="sv-divider" style="margin:8px auto 0;"><hr></div>');

  // Products
  var pgrid = document.getElementById('svProdGrid');
  pgrid.innerHTML = PRODUCTS.map(function(p,i){
    return '<div class="sv-prod-card" style="animation:svFadeUp .4s both;animation-delay:'+(0.4+i*0.08)+'s">'
      +'<div class="sv-prod-top">'
      +'<div class="sv-prod-icon" style="background:'+p.bg+'">'+p.icon+'</div>'
      +'<div class="sv-prod-name">'+(lang==='en'?p.name_en:p.name_es)+'</div>'
      +'</div>'
      +'<div class="sv-prod-desc">'+(lang==='en'?p.desc_en:p.desc_es)+'</div>'
      +'<a class="sv-prod-link" href="'+p.url+'" target="_blank">'+(lang==='en'?p.link_en:p.link_es)+' →</a>'
      +'</div>';
  }).join('');

  // Update static elements
  document.querySelectorAll('#sv-root [data-en]').forEach(function(el){
    var txt = el.getAttribute('data-'+lang);
    if(!txt) return;
    if(txt.indexOf('<')>-1) el.innerHTML=txt; else el.textContent=txt;
  });
}

function svToggle(card){
  var wasOpen = card.classList.contains('open');
  document.querySelectorAll('.sv-card').forEach(function(c){c.classList.remove('open');});
  if(!wasOpen){ card.classList.add('open'); setTimeout(svSendHeight,520); }
  svSendHeight();
}

function svLang(l){
  lang=l;
  document.querySelectorAll('.sv-lang-btn').forEach(function(b){ b.classList.toggle('on',b.dataset.lang===l); });
  renderAll();
  svSendHeight();
}

function svSendHeight(){
  var h = document.getElementById('sv-root').scrollHeight;
  window.parent.postMessage({mkHeight:h},'*');
}
window.addEventListener('load',svSendHeight);
window.addEventListener('resize',svSendHeight);
setInterval(svSendHeight,800);

var style=document.createElement('style');
style.textContent='@keyframes svFadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}';
document.head.appendChild(style);

renderAll();
</script>
</body>
</html>
